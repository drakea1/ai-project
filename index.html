<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Engine Platform</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #090614 0%, #0d0822 50%, #03010a 100%);
            --panel-bg: rgba(20, 16, 38, 0.7);
            --border-color: rgba(255, 255, 255, 0.06);
            --text-main: #f3f1f8;
            --accent-primary: #6366f1;
        }
        body { background: var(--bg-gradient); color: var(--text-main); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        .auth-box { margin-bottom: 20px; display: flex; gap: 10px; }
        .app-window { width: 460px; height: 500px; background: var(--panel-bg); backdrop-filter: blur(20px); border: 1px solid var(--border-color); border-radius: 24px; display: flex; flex-direction: column; overflow: hidden; }
        .chat-canvas { flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message-bubble { max-width: 85%; padding: 12px 16px; border-radius: 16px; font-size: 0.95rem; }
        .user { background: var(--accent-primary); align-self: flex-end; }
        .ai { background: rgba(255, 255, 255, 0.04); border: 1px solid var(--border-color); align-self: flex-start; }
        .input-dock { padding: 20px; border-top: 1px solid var(--border-color); display: flex; gap: 10px; }
        input { flex: 1; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); color: white; padding: 10px; border-radius: 8px; outline: none; }
        button { background: var(--text-main); color: black; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

    <div class="auth-box">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="signUp()">Sign Up</button>
        <button onclick="signIn()">Sign In</button>
    </div>

    <div class="app-window">
        <div class="chat-canvas" id="chatCanvas">
            <div class="message-bubble ai">Welcome. Please Sign In to begin.</div>
        </div>
        <div class="input-dock">
            <input type="text" id="userInput" placeholder="Ask anything..." onkeydown="if(event.key === 'Enter') executeTransmission()">
            <button onclick="executeTransmission()">Send</button>
        </div>
    </div>

 <script>
    // 1. Initialize Supabase ONCE
    // Replace these placeholders with your actual project keys!
    const SUPABASE_URL = 'https://jfzncgdujhdnnhrrnzki.supabase.co';
    const ANON_KEY = 'sb_publishable_UDpdCq_sJg9FDatJaM2V_g_q8G8uxSI';
    
    // Check if initialized to prevent the "already declared" error
    if (!window.supabaseClient) {
        window.supabaseClient = supabase.createClient(SUPABASE_URL, ANON_KEY);
    }
    const supabase = window.supabaseClient;

    // 2. Define functions
    async function signUp() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { error } = await supabase.auth.signUp({ email, password });
        if (error) alert(error.message); else alert('Check your email!');
    }

    async function signIn() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) alert(error.message); else alert('Signed in successfully!');
    }

    async function executeTransmission() {
        const input = document.getElementById('userInput');
        const canvas = document.getElementById('chatCanvas');
        const text = input.value.trim();
        if(!text) return;

        const { data: { session } } = await supabase.auth.getSession();
        if (!session) { alert('Please sign in first!'); return; }

        canvas.innerHTML += `<div class="message-bubble user">${text}</div>`;
        input.value = '';

        try {
            const response = await fetch('https://jfzncgdujhdnnhrrnzki.supabase.co/functions/v1/chat', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${session.access_token}` 
                },
                body: JSON.stringify({ message: text })
            });
            
            const data = await response.json();
            canvas.innerHTML += `<div class="message-bubble ai">${data.reply || data.error}</div>`;
            canvas.scrollTop = canvas.scrollHeight;
        } catch (err) {
            console.error(err);
            alert('Transmission failed.');
        }
    }
</script>
</body>
</html>
